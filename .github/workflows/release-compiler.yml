name: Release — Compiler

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
      tag:
        description: 'Pre-release tag (leave empty for stable)'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/compiler

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Bump version
        run: |
          VERSION=${{ github.event.inputs.version }}
          TAG=${{ github.event.inputs.tag }}
          if [ -n "$TAG" ]; then
            FULL_VERSION="${VERSION}-${TAG}"
          else
            FULL_VERSION="${VERSION}"
          fi
          bun x npm-json-update package.json version "$FULL_VERSION" 2>/dev/null || \
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
              pkg.version = '$FULL_VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV

      - name: Build
        run: bun run build

      - name: Verify binary works
        run: node bin/algolang --version

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            bun publish --access public --tag ${{ github.event.inputs.tag }}
          else
            bun publish --access public
          fi

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump compiler to v${{ env.FULL_VERSION }}"
          git tag "compiler-v${{ env.FULL_VERSION }}"
          git push origin HEAD --tags
