name: Release — LSP Server

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      compiler_version:
        description: '@algolang/compiler version to depend on (e.g. 1.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: packages/lsp-server

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Bump version and pin compiler dep
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            pkg.dependencies['@algolang/compiler'] = '^${{ github.event.inputs.compiler_version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Install with pinned compiler dep
        run: bun install
        working-directory: .

      - name: Build
        run: bun run build

      - name: Make bin executable
        run: chmod +x bin/algolang-lsp

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts --provenance

      - name: Restore workspace dep and commit
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies['@algolang/compiler'] = 'workspace:*';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(lsp-server): release v${{ steps.version.outputs.version }}"
          git tag "lsp-server-v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags
