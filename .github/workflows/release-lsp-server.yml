name: Release — LSP Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
      compiler_version:
        description: '@algolang/compiler version to depend on (e.g. 1.2.0)'
        required: true
      tag:
        description: 'Pre-release tag (leave empty for stable)'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/lsp-server

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Set versions
        run: |
          VERSION=${{ github.event.inputs.version }}
          TAG=${{ github.event.inputs.tag }}
          if [ -n "$TAG" ]; then
            FULL_VERSION="${VERSION}-${TAG}"
          else
            FULL_VERSION="${VERSION}"
          fi
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV

          # Bump version and pin compiler dep (replace workspace:* with real version)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$FULL_VERSION';
            pkg.dependencies['@algolang/compiler'] = '^${{ github.event.inputs.compiler_version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build
        run: bun run build

      - name: Make bin executable
        run: chmod +x bin/algolang-lsp

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            bun publish --access public --tag ${{ github.event.inputs.tag }}
          else
            bun publish --access public
          fi

      - name: Restore workspace dep & commit
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.dependencies['@algolang/compiler'] = 'workspace:*';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump lsp-server to v${{ env.FULL_VERSION }}"
          git tag "lsp-server-v${{ env.FULL_VERSION }}"
          git push origin HEAD --tags
