name: Release — Neovim Plugin

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version
        id: version
        working-directory: packages/nvim-plugin
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Build LSP server and bundle into plugin
        run: bun run build:nvim-plugin

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/nvim-plugin/package.json packages/nvim-plugin/server/server.js
          git commit -m "chore(nvim-plugin): release v${{ steps.version.outputs.version }}"
          git tag "nvim-plugin-v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Package plugin as zip
        run: |
          cd packages/nvim-plugin
          zip -r ../../nvim-algolang-${{ steps.version.outputs.version }}.zip \
            lua/ ftdetect/ syntax/ plugin/ server/ package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nvim-plugin-v${{ steps.version.outputs.version }}
          name: nvim-algolang v${{ steps.version.outputs.version }}
          body: |
            ## Neovim Plugin — AlgoLang v${{ steps.version.outputs.version }}

            ### Install with lazy.nvim (recommended)
            ```lua
            {
              "devalade/algo",
              subdir = "packages/nvim-plugin",
              ft = "algo",
            }
            ```

            ### What's included
            - Syntax highlighting (`syntax/algo.vim`)
            - Filetype detection (`ftdetect/algo.lua`)
            - LSP server bundled (`server/server.js`) — requires Node.js ≥ 18
            - Auto-setup on plugin load

            ### Manual install
            Download `nvim-algolang-${{ steps.version.outputs.version }}.zip`, extract to your Neovim runtime path.
          files: nvim-algolang-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
